<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin - OnlyFrenck</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="shortcut icon" href="https://onlyfrenck.com/immagini/logo.png" type="image/x-icon">
</head>
<body class="dark">
  <div class="dash-container">
    <h2>Dashboard Iscrizioni</h2>

    <div class="stat-section">
      <div class="stat-card" id="totaleIscritti">Totale iscritti: --</div>
      <div class="stat-card" id="eventoGita">Gita in casone: --</div>
    </div>

    <input type="text" id="search" placeholder="Cerca per nome, email o evento...">

    <button id="exportCSV">Esporta CSV</button>
    <button id="logoutBtn">Logout</button>

    <table id="tabella">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefono</th>
          <th>Evento</th>
          <th>Messaggio</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAxGm1Y26UZzxnYD9TZy9C97saff9oALBA",
      authDomain: "iscrizioni-a-evento.firebaseapp.com",
      projectId: "iscrizioni-a-evento",
      storageBucket: "iscrizioni-a-evento.appspot.com",
      messagingSenderId: "226347394046",
      appId: "1:226347394046:web:4bf0724fdf84e3cb02d6af"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tabella = document.querySelector("#tabella tbody");
    const searchInput = document.getElementById("search");
    const totaleEl = document.getElementById("totaleIscritti");
    const eventoGitaEl = document.getElementById("eventoGita");

    let dati = [];

    async function caricaDati() {
      const querySnapshot = await getDocs(collection(db, "iscrizioni"));
      dati = [];
      tabella.innerHTML = "";

      let contaGita = 0;

      querySnapshot.forEach(docSnap => {
        const data = docSnap.data();
        data.id = docSnap.id;
        dati.push(data);

        if (data.evento === "Gita in casone") contaGita++;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${data.nome}</td>
          <td>${data.email}</td>
          <td>${data.telefono}</td>
          <td>${data.evento}</td>
          <td>${data.messaggio || "-"}</td>
          <td><button class="delete-btn" data-id="${data.id}">🗑</button></td>
        `;
        tabella.appendChild(tr);
      });

      totaleEl.textContent = `Totale iscritti: ${dati.length}`;
      eventoGitaEl.textContent = `Gita in casone: ${contaGita}`;
    }

    searchInput.addEventListener("input", () => {
      const valore = searchInput.value.toLowerCase();
      const righe = tabella.querySelectorAll("tr");
      righe.forEach(riga => {
        const testo = riga.textContent.toLowerCase();
        riga.style.display = testo.includes(valore) ? "" : "none";
      });
    });

    tabella.addEventListener("click", async (e) => {
      if (e.target.classList.contains("delete-btn")) {
        const id = e.target.dataset.id;
        if (confirm("Vuoi eliminare questa iscrizione?")) {
          await deleteDoc(doc(db, "iscrizioni", id));
          caricaDati();
        }
      }
    });

    document.getElementById("exportCSV").addEventListener("click", () => {
      let csv = "Nome,Email,Telefono,Evento,Messaggio\n";
      dati.forEach(row => {
        csv += `${row.nome},${row.email},${row.telefono},${row.evento},"${row.messaggio || ""}"\n`;
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "iscrizioni.csv";
      link.click();
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      window.location.href = "/admin/login/";
    });

    caricaDati();
  </script>
</body>
</html>
